<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Dashboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            width: 250px;
        }
        h1 {
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>💳 Credit Card Fraud Dashboard</h1>

    <div class="card">
        <h2>Normal Transactions</h2>
        <p>{{ stats.normal }}</p>
    </div>

    <div class="card">
        <h2>Fraud Transactions</h2>
        <p>{{ stats.fraud }}</p>
    </div>

</body>
</html>
