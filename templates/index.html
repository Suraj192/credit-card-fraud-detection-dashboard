<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            width: 250px;
        }
        h1 {
            margin-top: 40px;
        }
        .chart-container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;

        }
    </style>
</head>
<body>

    <h1>💳 Credit Card Fraud Dashboard</h1>

    <div class="card">
        <h2>Normal Transactions</h2>
        <p>{{ normal }}</p>
    </div>

    <div class="card">
        <h2>Fraud Transactions</h2>
        <p>{{ fraud }}</p>
    </div>
    <div class="chart-container">
        <canvas id="fraudChart"></canvas>
    </div>
    <div class="chart-container">
        <h2>Average Transaction Amount</h2>
        <canvas id="amountChart"></canvas>
    </div>

    <script>
        const normalCount = {{ normal }};
        const fraudCount = {{ fraud }};

        const ctx = document.getElementById('fraudChart').getContext("2d");

        new Chart(ctx, {
            type: 'pie',
            data: {
                labels : ['Normal', 'Fraud'],
                datasets: [{
                    data: [normalCount, fraudCount],
                    backgroundColor: ['#4CAF50', '#F44336']
                }]
            }
        });

        
    </script>

    <script>
        const normalAvg = {{ normal_avg }};
        const fraudAvg = {{ fraud_avg }};

        const ctxBar = document.getElementById('amountChart').getContext('2d');

        new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Normal', 'Fraud'],
            datasets: [{
                label: 'Average Amount ($)',
                data: [normalAvg, fraudAvg],
                backgroundColor: ['#2196F3', '#FF9800']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
    </script>
    
    <a href="/predict">Go to Fraud Prediction</a>
</body>
</html>
